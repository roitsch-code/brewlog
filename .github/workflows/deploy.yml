name: Deploy

on:
  push:
    branches: [main]
    # Doc-only changes don't affect the running app — skip the deploy so a
    # documentation commit can't rotate the JS chunk hashes and strand an
    # installed PWA on a stale service-worker cache (the June-2026 widget
    # incident; see docs/ios-shell-roadmap.md Stolperstein log).
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      # CI/workflow files never affect the running app — a `.github` change must
      # not trigger an app redeploy (which would rotate chunk hashes for nothing).
      - ".github/**"
      # The native iOS shell builds via ios-testflight.yml, never the web deploy.
      - "native/**"

# Serialise deploys. Without this, two pushes (or a double-delivered push event)
# can start two deploy jobs that race on the VPS git checkout — one job's
# `git fetch` updates refs/remotes/origin/main while the other still expects the
# old value, giving "cannot lock ref 'refs/remotes/origin/main'" and a failed
# deploy (June 2026). Queue instead of cancel so an in-flight deploy always
# finishes cleanly; the next run resets to whatever origin/main is by then.
concurrency:
  group: deploy-hetzner
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner VPS
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          # Defensive sequence:
          #   1. fetch + hard reset to origin/main
          #   2. build new app image (existing container still runs)
          #   3. recreate ONLY the app container via compose itself.
          #      Letting compose do the teardown serialises with any
          #      other compose operation against the same project; the
          #      hand-rolled `docker rm -f` we used before raced with
          #      compose's own reconciliation when a manual `up -d
          #      <service>` overlapped with the workflow (June 2026
          #      deploy hit "removal of container <id> is already in
          #      progress" exactly that way).
          #      --no-deps keeps postgres + caddy + ofelia untouched.
          #      --force-recreate handles the "container already exists"
          #      and "in-progress removal" daemon states gracefully.
          #   4. fallback retry loop for the rare daemon wedge.
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash <<'REMOTE'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            # Clear any stale ref lock left by a crashed/raced prior fetch, then
            # reset to FETCH_HEAD (doesn't require updating the remote-tracking
            # ref, so it can't fail on "cannot lock ref refs/remotes/origin/main").
            rm -f .git/refs/remotes/origin/main.lock 2>/dev/null || true
            git fetch origin main
            git reset --hard FETCH_HEAD

            # One-shot migration: apply 0017 if it hasn't run yet.
            # The SQL is fully idempotent (column add uses IF NOT EXISTS;
            # CHECK constraint drop+re-add via DO-block that no-ops when
            # the constraint already contains 'snoozed'). Safe to run on
            # every deploy. Remove this block once everyone is on 0017+
            # and the next migration ships with its own apply step.
            if [ -f src/lib/db/migrations/0017_add_insight_snooze.sql ]; then
              echo "Applying migration 0017_add_insight_snooze..."
              docker compose exec -T postgres \
                psql -U brewlog -d brewlog -v ON_ERROR_STOP=1 \
                < src/lib/db/migrations/0017_add_insight_snooze.sql
            fi

            # Sync the Mistral keys into the VPS .env from the GitHub secrets so
            # /recommend (MISTRAL_API_KEY) AND the coach (MISTRAL_COACH_API_KEY)
            # run on Mistral Large (≈¼ the Opus per-call cost; issue #453) AND a
            # ROTATED key actually takes effect. The earlier append-only version
            # only wrote when no key was present, so rotating the secret (e.g.
            # moving it to a cost-separated Mistral workspace) left the stale key
            # live on the VPS. This replaces ONLY those two lines — every other var
            # is preserved — and commits the result only when those other vars
            # survived (wc -l > 2, the two lines we append), so it can never clobber
            # the production .env. An empty secret writes an empty line → the code
            # auto-detects no key → that surface stays on Opus. Absent .env → no-op.
            if [ -f .env ]; then
              grep -v -e '^MISTRAL_API_KEY=' -e '^MISTRAL_COACH_API_KEY=' .env > .env.tmp 2>/dev/null || true
              printf 'MISTRAL_API_KEY=%s\n' '${{ secrets.MISTRAL_API_KEY }}' >> .env.tmp
              printf 'MISTRAL_COACH_API_KEY=%s\n' '${{ secrets.MISTRAL_COACH_API_KEY }}' >> .env.tmp
              if [ "$(wc -l < .env.tmp)" -gt 2 ]; then
                mv .env.tmp .env
                echo "Synced MISTRAL_API_KEY + MISTRAL_COACH_API_KEY in .env"
              else
                rm -f .env.tmp
                echo "WARNING: Mistral key sync skipped (would have dropped other vars)"
              fi
            fi

            docker compose build app

            if docker compose up -d --force-recreate --no-deps app; then
              exit 0
            fi

            echo "compose up failed — waiting for in-progress operations to settle, then retrying"
            for attempt in 1 2 3 4 5; do
              sleep $((attempt * 3))
              docker ps -aq --filter 'label=com.docker.compose.project=brewlog' \
                            --filter 'label=com.docker.compose.service=app' \
                | xargs -r docker rm -f >/dev/null 2>&1 || true
              if docker compose up -d --force-recreate --no-deps app; then
                exit 0
              fi
              echo "retry $attempt failed, sleeping..."
            done

            echo "deploy failed after 5 retries"
            exit 1
          REMOTE
