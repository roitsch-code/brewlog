name: iOS Bootstrap

# One-shot: generates the native iOS Xcode project from the native/ scaffold and
# opens a PR committing it. Run this ONCE from the Actions tab (and again only if
# the Capacitor project needs regenerating). Needs NO Apple secrets — `cap add
# ios` + asset generation are fully offline. The owner merges the PR it opens;
# the ios-testflight workflow then builds from the committed native/ios/.

on:
  workflow_dispatch:

concurrency:
  group: ios-bootstrap
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Capacitor 8's CLI requires Node >= 22 (the repo's other workflows
          # run on 20; the iOS ones must not).
          node-version: 22
          cache: npm
          cache-dependency-path: native/package-lock.json

      - name: Install Capacitor toolchain
        run: npm ci

      - name: Add the iOS platform
        run: npx cap add ios

      - name: Generate app icons + splash (cream background)
        run: npm run assets

      - name: Skip the export-compliance prompt on every build
        # ITSAppUsesNonExemptEncryption=false → TestFlight won't ask the
        # "does your app use encryption?" question per upload.
        run: plutil -replace ITSAppUsesNonExemptEncryption -bool false ios/App/App/Info.plist

      - name: Sanity sync
        run: npx cap sync ios

      - name: Open a PR with the generated Xcode project
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="ios/bootstrap-generated"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          # native/.gitignore keeps Pods + build artifacts out; the Xcode
          # project + Podfile(.lock) get committed.
          git add native/ios
          if git diff --cached --quiet; then
            echo "No changes to commit — native/ios already up to date."
            exit 0
          fi
          git commit -m "build: generate native/ios Xcode project (cap add ios)"
          git push -u origin "$BRANCH" --force-with-lease
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "build: generated native/ios Xcode project (iOS shell Phase 3)" \
            --body "Auto-generated by the **iOS Bootstrap** workflow (\`npx cap add ios\` + \`@capacitor/assets\`). This commits the native Xcode project so the **iOS TestFlight** workflow can build it. CocoaPods + build artifacts are gitignored and regenerated in CI. Merge this, then run **iOS TestFlight** from the Actions tab."
