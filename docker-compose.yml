services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: brewlog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: brewlog
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brewlog"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: brewlog-app:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://brewlog:${POSTGRES_PASSWORD}@postgres:5432/brewlog
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # /recommend runs on Mistral Large when MISTRAL_API_KEY is set (≈¼ the Opus
      # cost; see issue #453). Until then it stays on Opus. Set RECOMMEND_PROVIDER
      # to "anthropic" to force-rollback to Opus, or "mistral" to force Mistral.
      # The key lives in a cost-separated "BrewLog" Mistral workspace; deploy.yml
      # always-syncs it from the GitHub secret so a rotated key takes effect.
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      RECOMMEND_PROVIDER: ${RECOMMEND_PROVIDER:-}
      # The BTTS Coach (corpus insights + per-coffee card) runs on Mistral Large
      # when MISTRAL_COACH_API_KEY is set, else stays on Opus. Its OWN key (a
      # separate "BrewLog-Coach" Mistral workspace) so its spend is billed apart
      # from /recommend. COACH_PROVIDER=anthropic force-rolls back to Opus.
      # deploy.yml always-syncs the key from the GitHub secret.
      MISTRAL_COACH_API_KEY: ${MISTRAL_COACH_API_KEY:-}
      COACH_PROVIDER: ${COACH_PROVIDER:-}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      NEXT_PUBLIC_S3_PUBLIC_URL_PREFIX: ${NEXT_PUBLIC_S3_PUBLIC_URL_PREFIX}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_PIN: ${AUTH_PIN}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN}
      CRON_SECRET: ${CRON_SECRET}
      COFFEE_ALERT_WEBHOOK_SECRET: ${COFFEE_ALERT_WEBHOOK_SECRET}
      USER_DISPLAY_NAME: ${USER_DISPLAY_NAME}
      USER_LOCATION: ${USER_LOCATION}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID}
      ELEVENLABS_BASE_URL: ${ELEVENLABS_BASE_URL}
      # APNs push (Apple Watch brew cues). Empty until the "Set APNs secrets on
      # VPS" workflow writes them into .env; the app no-ops without them.
      APNS_KEY_P8: ${APNS_KEY_P8:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.roitsch.btts.watchkitapp}
      APNS_PRODUCTION: ${APNS_PRODUCTION:-true}
      # One-way caffeine push to the co-hosted HealthSync app (same "brewlog"
      # Docker network). BrewLog POSTs each logged coffee's volume to HealthSync's
      # ingest endpoint. URL defaults to the internal container address (no Caddy/
      # Authelia hop); override via .env with the public URL
      # (https://health.markus-reuter.com/api/ingest/brewlog) if internal
      # networking fails. SECRET must equal HealthSync's INGEST_SECRET; empty →
      # the push no-ops. deploy.yml syncs the secret from the GitHub secret.
      HEALTHSYNC_INGEST_URL: ${HEALTHSYNC_INGEST_URL:-http://healthsync-healthsync-web-1:3000/api/ingest/brewlog}
      HEALTHSYNC_INGEST_SECRET: ${HEALTHSYNC_INGEST_SECRET:-}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./deploy/ofelia.ini:/etc/ofelia/config.ini:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pg-data:
  caddy-data:
  caddy-config:
