[global]
slack-only-on-error = true

[job-exec "research"]
schedule = 0 6 */2 * *
container = brewlog-app-1
command = curl -sf -X POST http://localhost:3000/api/research -H "Authorization: Bearer ${CRON_SECRET}"
no-overlap = true

[job-exec "coffees-compact"]
schedule = 0 3 * * 1
container = brewlog-app-1
command = curl -sf -X POST http://localhost:3000/api/coffees/compact -H "Authorization: Bearer ${CRON_SECRET}"
no-overlap = true
