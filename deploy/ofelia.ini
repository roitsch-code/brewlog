[global]
slack-only-on-error = true

[job-exec "research"]
schedule = 0 6 */2 * *
container = brewlog-app-1
command = curl -sf -X POST http://localhost:3000/api/research -H "Authorization: Bearer ${CRON_SECRET}"
no-overlap = true

[job-exec "coffees-compact"]
schedule = 0 3 * * 1
container = brewlog-app-1
command = curl -sf -X POST http://localhost:3000/api/coffees/compact -H "Authorization: Bearer ${CRON_SECRET}"
no-overlap = true

# Daily at 04:00 — delete archived conversations older than 7 days.
# Active (non-archived) conversations are NEVER touched. See
# src/app/api/conversations/cleanup/route.ts for the 7-day rationale.
[job-exec "conversations-cleanup"]
schedule = 0 4 * * *
container = brewlog-app-1
command = curl -sf -X POST http://localhost:3000/api/conversations/cleanup -H "Authorization: Bearer ${CRON_SECRET}"
no-overlap = true

# Adaptive hydration target — recompute from heat (Open-Meteo) + movement (Oura).
# Morning seeds the day; the late-afternoon refresh picks up accumulated activity
# before the 20:30 check-in. Times are UTC (container clock) ≈ 07:00 / 18:00
# Berlin in summer. Answer fields are preserved on recompute. See
# src/app/api/hydration/compute/route.ts.
[job-exec "hydration-morning"]
schedule = 0 5 * * *
container = brewlog-app-1
command = curl -sf -X POST http://localhost:3000/api/hydration/compute -H "Authorization: Bearer ${CRON_SECRET}"
no-overlap = true

[job-exec "hydration-afternoon"]
schedule = 0 16 * * *
container = brewlog-app-1
command = curl -sf -X POST http://localhost:3000/api/hydration/compute -H "Authorization: Bearer ${CRON_SECRET}"
no-overlap = true
